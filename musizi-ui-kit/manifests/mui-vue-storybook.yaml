apiVersion: apps/v1
kind: Deployment
metadata:
  name: mui-vue-storybook
  namespace: apps-musizi
  labels:
    app: mui-vue-storybook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mui-vue-storybook
  template:
    metadata:
      labels:
        app: mui-vue-storybook
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/northgreenug/musizi-ui-kit-storybook:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mui-vue-storybook-svc
  namespace: apps-musizi
spec:
  selector:
    app: mui-vue-storybook
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mui-vue-storybook-ingress
  namespace: apps-musizi
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mui-vue.musizi.ac.ug`)
      kind: Rule
      services:
        - name: mui-vue-storybook-svc
          port: 80
  tls:
    secretName: musizi-tls-secret
