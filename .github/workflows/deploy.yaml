name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: northgreenug/musizi-uni

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            GITHUB_TOKEN=${{ secrets.NPM_TOKEN }}

  deploy:
    name: Deploy to K3s
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.28.0'

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          sed -i "s/127.0.0.1/${{ secrets.PROD_IP }}/g" ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update deployment
        run: |
          kubectl set image deployment/musizi-uni \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            -n apps-musizi

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/musizi-uni -n apps-musizi --timeout=300s

      - name: Verify health
        run: |
          # Get the ready pod from the current replicaset
          RS=$(kubectl get deployment musizi-uni -n apps-musizi -o jsonpath='{.status.updatedReplicas}')
          echo "Updated replicas: $RS"
          # Simple health check via service
          kubectl run health-check --rm -i --restart=Never --image=busybox -n apps-musizi -- wget -qO- http://musizi-uni-svc:80 > /dev/null
          echo "Deployment healthy"
